<style>
    .Box {
        background-color:#000000;
        border:solid white;
        border-width: 1.125vh 1.125vh;
        color:#ffffff;
        overflow: auto;
        font-family: Determination;
        position:relative;
    }
    @font-face {
        font-family: 'Determination';
        src: url('./Fonts/DeterminationMono.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
    .Text {
        color:#ffffff;
        font-size:calc(5vw - 10%);
        font-family: Determination;
        position:relative;
    }
    
    .tab {
      transition: transform 0.2s ease;
      width: 66vw;
      position:relative;
      margin: 5% 0 5% 16.5%;
      cursor: pointer;
      border:solid white;
      border-width:1vw;
      text-align:center;
      align-items: center;
      justify-content: center;
      display: flex;
    }
    
    .tab:hover {
      transform: scale(1.08);
      border-color:#fcf403;
      border-width:1vw;
    }
    .TabText {
        color:white;
        position:absolute;
        z-index:2;
        font-size:4vw;
        text-shadow:
            -1px -1px 0 black,
             1px -1px 0 black,
            -1px  1px 0 black,
             1px  1px 0 black,
             0px -1px 0 black,
             0px  1px 0 black,
            -1px  0px 0 black,
             1px  0px 0 black;
    }
    .tab:hover .TabText {
        color:#fcf403;
    }
</style>

<style>
a:link {
  color: yellow;
  background-color: transparent;
  text-decoration: none;
}

a:visited {
  color: yellow;
  background-color: transparent;
  text-decoration: none;
}

a:hover {
  color: yellow;
  background-color: transparent;
  text-decoration: underline;
}

a:active {
  color: yellow;
  background-color: transparent;
  text-decoration: underline;
}
</style>

<style>
    .slider {
      appearance: none;
      width: 80%;
      height: 2%;
      background: #ffffff;
      outline: none;
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25;
      height: 25;
      background: #ffffff;
      cursor: pointer;
    }
    .dpsInput {
        font-size:calc(2vw - 2%);
        border:solid white 0px;
        background-color:black;
        position:relative;
        width:10%;
        display:inline-block;
        font-family:Determination;
        color:white;
    }
    .dpsInput::-webkit-outer-spin-button,
    .dpsInput::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
        input[type=number] {
            appearance: textfield;
        }
    }
    select,
    select::picker(select) {
    appearance: base-select; 
    border-radius: 0;
    color: #ffffff;
    background-color: #000000;
    border: 0.25rem solid #ffffff;
    padding: 0.5rem;
    }

    select::picker-icon {
    display: none;
    }
</style>

        <!--Volume-->
        <div style="display:flex; flex-direction: column;">
            <p class="Text" id="volumeText" style="font-size:2rem; margin:0 0 0.5 5rem">Volume: 50</p>

        <div style="display: flex; flex-direction: column;">

    <script src="./Data/Settings.js"></script>

    <script> 
        config = window.Settings;

        var labels = [
            "Jevil",
            "Spamton",
            "Eram",
            "Gerson",
            "King",
            "Queen",
            "Tenna",
            "Titan",
            "Roaring Knight",
        ];

        var changeValues = {
            "volume": (key) => {return document.getElementById(key).value},
            "clicker":(key) => {return document.getElementById('clicker').value},
            "precision":(key) => {return (document.getElementById('precision').value < 10) ? document.getElementById('precision').value : 'Max'},
        }

        if (config.current) {
            for (let key of Object.keys(config.default)) {
                if (document.getElementById(key).type == "range") {
                    document.getElementById(key + "Text").innerHTML = key.slice(0,1).toUpperCase() + key.slice(1,key.length) + ": " + config.get(key);
                    document.getElementById(key).value = config.get(key);

                    document.getElementById(key).addEventListener("input", function () {
                        changeSetting(key, changeValues[key](key));
                    });
                } else if (document.getElementById(key).type == "select-one") {
                    document.getElementById(key).value = config.get(key);

                    document.getElementById(key).addEventListener("input", function () {
                        changeSetting(key, changeValues[key](key));
                    });
                }

                document.getElementById(key).addEventListener("change", function () {
                    var a = new Audio("./Sounds/Switch.mp3");
                    a.volume = config.get("volume")/100;
                    a.play();
                });
            }
        }
        function changeSetting(key, val) {
            var Txt = document.getElementById(key + "Text");
            if (document.getElementById(key).type == "range") {
                Txt.innerHTML = key.slice(0,1).toUpperCase() + key.slice(1,key.length) + ": " + val;
                config.set(key, val);
            } else if (document.getElementById(key).type == "select-one") {
                config.set(key, val);
            }
        }
        
    </script>
</html>
